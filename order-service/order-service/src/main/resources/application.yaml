server:
  port: 8082

spring:
  application:
    name: order-service
  config:
    import: "optional:configserver:http://localhost:8888"
  main:
    allow-circular-references: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers

resilience4j:
  circuitbreaker:
    instances:
      paymentService:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 3  #Track last 3 calls
        failure-rate-threshold: 50 #Open if 50% + fail
        wait-duration-in-open-state: 5s  #wait 5s before Half-OPEN
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: true
  bulkhead:
    instances:
     paymentService:
      max-concurrent-calls: 10 # max 10 simultaneous calls to Payment
      max-wait-duration: 0ms # do NOT wait , do NOT queue — fail immediately if full
    # max-wait-duration: 500ms # alternative: wait up to 500ms for a slot

  timelimiter:
    instances:
      paymentService:
        timeout-duration: 2s # fail if Payment takes > 2 seconds
        cancel-running-future: true

  retry:
    instances:
      paymentService:
        max-attempts: 3  # 3 trys
        wait-duration: 500ms  # waiting time during each try
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.lang.RuntimeException
        ignore-exceptions:
          - java.lang.IllegalArgumentException